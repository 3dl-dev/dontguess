name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure git for private repo access
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Install cf
        run: |
          CF_VER=$(curl -fsSL https://api.github.com/repos/campfire-net/campfire/releases/latest | grep '"tag_name"' | sed 's/.*"\(v[^"]*\)".*/\1/')
          curl -fsSL "https://github.com/campfire-net/campfire/releases/download/${CF_VER}/cf_linux_amd64.tar.gz" | tar xz -C /tmp
          sudo install -m 755 /tmp/cf_linux_amd64/cf /usr/local/bin/cf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dense embedder deps
        # Required by the dense-embedder regression tests (dontguess-553):
        # cmd/embed/main.py imports numpy, onnxruntime, tokenizers and
        # self-installs the all-MiniLM-L6-v2 ONNX model on first run. These
        # tests run the real embedder (no mocks) per the ground-source rule.
        run: pip install --upgrade numpy onnxruntime tokenizers

      - name: Run tests
        env:
          GOPRIVATE: github.com/campfire-net/campfire
        run: go test ./...

      - name: Build check
        env:
          GOPRIVATE: github.com/campfire-net/campfire
        run: go build ./cmd/dontguess ./cmd/seller

      - name: Vet
        run: go vet ./...

      - name: E2E install test
        env:
          GOPRIVATE: github.com/campfire-net/campfire
        run: ./test/e2e-install.sh
