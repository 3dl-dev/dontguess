name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests (non-cmd/dontguess, -race)
        # -race is load-bearing: pkg/exchange dispatch, pkg/relay (intake/outbox/watchdog/conn)
        # and pkg/scrip run concurrent goroutines with shared state (M2 nostr surface).
        #
        # cmd/dontguess is EXCLUDED here and run in its own serialized step below
        # (dontguess-7ae3, dontguess-2f7). Root cause: cmd/dontguess accumulates heavy
        # E2E tests that each spin a real relay + engine + a full buy->match->settle-
        # >deliver flow under a wall-clock deadline. Co-scheduling that package's
        # -race binary alongside all other packages' -race binaries under a single
        # `go test -race ./...` invocation starves the goroutine scheduler enough
        # that the slowest buy misses its per-op deadline and reports an "ambiguous
        # timeout" — proven NOT a code regression (the same tests pass isolated in
        # 1-3s; see dontguess-2f7 flake investigation). Sharding cmd/dontguess into
        # its own -parallel 1 job removes the cross-package contention that causes
        # the false timeout; bumping per-test deadlines does not fix the root cause
        # and was rejected as a real fix.
        run: go test -race $(go list ./... | grep -v '/cmd/dontguess$')

      - name: cmd/dontguess -race (serialized, cache-immune)
        # Runs on its own, with -parallel 1 to serialize tests WITHIN the package, so
        # its heavy E2E tests are never co-scheduled against the other packages'
        # -race binaries — the CPU-starvation false timeout described above only
        # reproduces under that cross-package contention (proven: cmd/dontguess alone
        # at full -race parallelism already passes; only ./... starves it further).
        # -count=1 disables the test cache UNCONDITIONALLY (ed2-G / dontguess-392,
        # nostr-first-client-ed2.md §7.3, H7) so a client regression driving the real
        # cobra RunE (put/buy) against a full team-tier serve stack can never ship
        # cached-green. -race keeps the concurrent serve goroutines honest.
        # (./test/... has no heavy E2E contention and is covered by the step above.)
        run: go test -race -count=1 -parallel 1 ./cmd/dontguess/...

      - name: Build check
        run: go build ./cmd/dontguess

      - name: Vet
        run: go vet ./...
